[workspace]
authors = ["Braden Griebel <bgriebel@uw.edu>"]
channels = ["conda-forge"]
name = "simulation"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
create_model = { cmd = "python 01_create_model.py", cwd = "scripts" }
find_metabolite_networks = { cmd = "python 02_metabolite_networks.py", cwd = "scripts" }
metabolic_network_analysis = { cmd = "python 03_metabolic_network_analysis.py", cwd = "scripts" }
ko_divergence = { cmd = "python 04_ko_divergence.py", cwd = "scripts" }
mi_network = { cmd = "python 05_mutual_information.py", cwd = "scripts" }
density = { cmd = "python 06_density.py", cwd = "scripts" }
visualization_script = { cmd = "python 08_visualization.py", cwd = "scripts" }
viz = [{ task = "visualization_script", environment = "viz" }]
all = [
  { task = "create_model" },
  { task = "find_metabolite_networks" },
  { task = "metabolic_network_analysis" },
  { task = "ko_divergence" },
  { task = "mi_network" },
  { task = "density" },
  { task = "visualization_script", environment = "viz" },
]

[dependencies]
python = ">=3.13.10,<3.14"
cobra = ">=0.30.0,<0.31"
scipy = ">=1.16.3,<2"
networkx = ">=3.6,<4"
pandas = ">=2.3.3,<3"
numpy = ">=2.3.5,<3"
optlang = ">=1.8.3,<2"
sympy = ">=1.14.0,<2"
tqdm = ">=4.67.1,<5"
pyarrow = ">=22.0.0,<23"
joblib = ">=1.5.2,<2"
osqp = ">=1.0.5,<2"
highspy = ">=1.12.0,<2"
openpyxl = ">=3.1.5,<4"

[pypi-dependencies]
metworkpy = ">=0.2.6, <0.3"

[feature.dev.dependencies]
mypy = ">=1.19.0,<2"
ruff = ">=0.14.8,<0.15"
python-lsp-server = ">=1.13.2,<2"
pandas-stubs = ">=2.3.3.251201,<3"
taplo = ">=0.10.0,<0.11"
types-networkx = ">=3.6.0.20251127,<4"

[feature.escher.pypi-dependencies]
Escher = ">=1.8.1, <2"
metabolic-modeling-utils = { git = "https://github.com/Braden-Griebel/metabolic_modeling_utils.git" }

[feature.viz.dependencies]
pandas = ">=2.3.3,<3"
numpy = ">=2.3.5,<3"
networkx = ">=3.6,<4"
matplotlib = ">=3.10.8,<4"
seaborn = ">=0.13.2,<0.14"

[environments]
dev = ["dev", "default"]
viz = ["escher", "viz", "dev"]
