[workspace]
authors = ["Braden Griebel <bgriebel@uw.edu>"]
channels = ["conda-forge"]
name = "simulation"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
create_model = { cmd = "python scripts/01_create_model.py" }
find_metabolite_networks = { cmd = "python scripts/02_metabolite_networks.py" }
metabolic_network_analysis = { cmd = "python scripts/03_metabolic_network_analysis.py" }
ko_divergence = { cmd = "python scripts/04_ko_divergence.py" }
all = [
  { task = "create_model" },
  { task = "find_metabolite_networks" },
  { task = "metabolic_network_analysis" },
  { task = "ko_divergence" },
]

[dependencies]
python = "3.13.*"
cobra = ">=0.30.0,<0.31"
scipy = ">=1.16.3,<2"
networkx = ">=3.6,<4"
pandas = ">=2.3.3,<3"
numpy = ">=2.3.5,<3"
optlang = ">=1.8.3,<2"
sympy = ">=1.14.0,<2"
tqdm = ">=4.67.1,<5"
pyarrow = ">=22.0.0,<23"
joblib = ">=1.5.2,<2"
osqp = ">=1.0.5,<2"
highspy = ">=1.12.0,<2"
openpyxl = ">=3.1.5,<4"

[pypi-dependencies]
metworkpy = ">=0.2.5, <0.3"

[feature.dev.dependencies]
mypy = "*"
ruff = "*"
python-lsp-server = ">=1.13.2,<2"
pandas-stubs = ">=2.3.2.250926,<3"
taplo = ">=0.10.0,<0.11"
types-networkx = ">=3.6.0.20251127,<4"

[environments]
dev = ["dev", "default"]
